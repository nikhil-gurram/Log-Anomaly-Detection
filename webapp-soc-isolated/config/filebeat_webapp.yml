filebeat.inputs:
  - type: filestream
    id: webapp-json-logs
    enabled: true
    paths:
      - D:/Log-Anamoly-Detection/webapp-soc-isolated/logs/webapp_access.log
    parsers:
      - ndjson:
          target: ""
          add_error_key: true

processors:
  - add_host_metadata: ~
  - add_fields:
      target: project
      fields:
        name: webapp-soc-isolated
        source_type: webapp

output.elasticsearch:
  hosts: ["http://localhost:9200"]
  username: "elastic"
  password: "changeme"

setup.template.enabled: true
setup.template.name: filebeat-webapp
setup.template.pattern: filebeat-webapp-*
