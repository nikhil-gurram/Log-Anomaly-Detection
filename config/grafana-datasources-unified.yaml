apiVersion: 1

datasources:
  - name: SOC-Windows-Raw
    uid: SOC-Windows-Raw
    type: elasticsearch
    access: proxy
    url: ${ELASTICSEARCH_URL}
    basicAuth: true
    basicAuthUser: ${ELASTIC_USER}
    jsonData:
      index: winlogbeat-fallback-*
      timeField: "@timestamp"
      interval: "1m"
      esVersion: 8.0.0
      includeFrozen: false
    secureJsonData:
      basicAuthPassword: ${ELASTIC_PASSWORD}

  - name: SOC-Windows-ML
    uid: SOC-Windows-ML
    type: elasticsearch
    access: proxy
    url: ${ELASTICSEARCH_URL}
    basicAuth: true
    basicAuthUser: ${ELASTIC_USER}
    jsonData:
      index: ml-anomalies-*
      timeField: "timestamp"
      interval: "1m"
      esVersion: 8.0.0
      includeFrozen: false
    secureJsonData:
      basicAuthPassword: ${ELASTIC_PASSWORD}

